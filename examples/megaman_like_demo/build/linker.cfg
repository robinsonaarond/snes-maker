MEMORY {
    ZP:      start = $0000,   size = $0100, type = rw, define = yes;
    RAM:     start = $7E0100, size = $1F00, type = rw, define = yes;
    ROM0:    start = $008000, size = $7FC0, file = %O, fill = yes;
    HEADER:  start = $00FFC0, size = $0020, file = %O, fill = yes;
    VECTORS: start = $00FFE0, size = $0020, file = %O, fill = yes;
}

SEGMENTS {
    ZEROPAGE: load = ZP, type = zp;
    BSS:      load = RAM, type = bss, define = yes;
    CODE:     load = ROM0, type = ro;
    RODATA:   load = ROM0, type = ro;
    HEADER:   load = HEADER, type = ro;
    VECTORS:  load = VECTORS, type = ro;
}
